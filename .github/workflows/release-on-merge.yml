name: Release on Merge

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'include/**'
      - 'interface/src/**'
      - 'platformio.ini'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Check if version bump commit
        id: check
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          COMMIT_MSG=$(cat << 'EOF'
          ${{ github.event.head_commit.message }}
          EOF
          )

          if [[ "$COMMIT_MSG" == "chore(release):"* ]]; then
            echo "This is a version bump commit, skipping"
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "Proceeding with release"
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        if: steps.check.outputs.should_release == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        if: steps.check.outputs.should_release == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: interface/package-lock.json

      - name: Setup Python
        if: steps.check.outputs.should_release == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        if: steps.check.outputs.should_release == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            .pio
          key: ${{ runner.os }}-pio-release-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-release-
            ${{ runner.os }}-pio-

      - name: Install dependencies
        if: steps.check.outputs.should_release == 'true'
        run: |
          pip install platformio esptool
          pio --version
          cd interface && npm ci

      - name: ✅ Run authoritative repo gate
        if: steps.check.outputs.should_release == 'true'
        run: ./scripts/ci-test.sh

      - name: Get version from config.h
        if: steps.check.outputs.should_release == 'true'
        id: version
        run: |
          VERSION=$(grep '#define FIRMWARE_VERSION' include/config.h | sed 's/.*"\(.*\)".*/\1/')
          echo "Version from config.h: $VERSION"
          NEW_TAG="v${VERSION}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT

      - name: Guard against tag collision
        if: steps.check.outputs.should_release == 'true'
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "::error::Tag ${{ steps.version.outputs.tag }} already exists. Bump FIRMWARE_VERSION in config.h before merging."
            exit 1
          fi

      - name: Update other version files
        if: steps.check.outputs.should_release == 'true'
        run: |
          sed -i 's/"version": ".*"/"version": "${{ steps.version.outputs.tag }}"/' docs/install/manifest.json
          sed -i 's/^\*\*Version:\*\* .*/**Version:** ${{ steps.version.outputs.version }}/' docs/MANUAL.md

      - name: Build web interface
        if: steps.check.outputs.should_release == 'true'
        run: |
          cd interface
          npm run build
          npm run deploy

      - name: Check packaged web assets
        if: steps.check.outputs.should_release == 'true'
        run: |
          python3 scripts/check_web_asset_budget.py
          python3 scripts/check_audio_asset_manifest.py

      - name: Stage manifest-tracked audio files
        if: steps.check.outputs.should_release == 'true'
        run: node interface/scripts/stage-audio.js

      - name: Build firmware
        if: steps.check.outputs.should_release == 'true'
        run: pio run -e waveshare-349 -j 1

      - name: Build filesystem
        if: steps.check.outputs.should_release == 'true'
        run: pio run -e waveshare-349 -t buildfs -j 1

      - name: Create merged firmware
        if: steps.check.outputs.should_release == 'true'
        run: |
          mkdir -p release
          cp .pio/build/waveshare-349/bootloader.bin release/
          cp .pio/build/waveshare-349/partitions.bin release/
          cp ~/.platformio/packages/framework-arduinoespressif32/tools/partitions/boot_app0.bin release/
          cp .pio/build/waveshare-349/firmware.bin release/
          cp .pio/build/waveshare-349/littlefs.bin release/

          esptool.py --chip esp32s3 merge_bin \
            -o release/merged-firmware.bin \
            --flash_mode qio \
            --flash_freq 80m \
            --flash_size 16MB \
            0x0000 release/bootloader.bin \
            0x8000 release/partitions.bin \
            0xe000 release/boot_app0.bin \
            0x10000 release/firmware.bin \
            0xda0000 release/littlefs.bin

          cp docs/install/manifest.json release/

      - name: Create tag
        if: steps.check.outputs.should_release == 'true'
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Create GitHub Release
        if: steps.check.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            release/merged-firmware.bin
            release/manifest.json
            release/*.bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare web installer files
        if: steps.check.outputs.should_release == 'true'
        run: |
          cp release/*.bin docs/install/
          cp release/manifest.json docs/install/

      - name: Deploy to GitHub Pages
        if: steps.check.outputs.should_release == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/install
          destination_dir: install

      - name: Summary
        if: steps.check.outputs.should_release == 'true'
        run: |
          echo "## 🚀 Release Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Authoritative repo gate passed" >> $GITHUB_STEP_SUMMARY
          echo "✅ Tag created (immutable)" >> $GITHUB_STEP_SUMMARY
          echo "✅ Firmware built" >> $GITHUB_STEP_SUMMARY
          echo "✅ GitHub Release created" >> $GITHUB_STEP_SUMMARY
          echo "✅ Web flasher updated" >> $GITHUB_STEP_SUMMARY
