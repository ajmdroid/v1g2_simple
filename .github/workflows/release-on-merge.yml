name: Release on Merge

# Single workflow: PR merge → build → release → deploy
# Version is read from include/config.h (set it before merging PR)
on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'include/**'
      - 'interface/src/**'
      - 'platformio.ini'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false
    
    steps:
      - name: Check if version bump commit
        id: check
        run: |
          # For workflow_dispatch, always proceed
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Get commit message
          COMMIT_MSG=$(cat << 'EOF'
          ${{ github.event.head_commit.message }}
          EOF
          )
          
          if [[ "$COMMIT_MSG" == "chore(release):"* ]]; then
            echo "This is a version bump commit, skipping"
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "Proceeding with release"
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Checkout
        if: steps.check.outputs.should_release == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Node.js
        if: steps.check.outputs.should_release == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: interface/package-lock.json
      
      - name: Setup Python
        if: steps.check.outputs.should_release == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        if: steps.check.outputs.should_release == 'true'
        run: |
          pip install platformio esptool
          cd interface && npm ci

      - name: Check WiFi API contracts
        if: steps.check.outputs.should_release == 'true'
        run: python3 scripts/check_wifi_api_contract.py

      - name: Check BLE hot-path contract
        if: steps.check.outputs.should_release == 'true'
        run: python3 scripts/check_ble_hot_path_contract.py

      - name: Check perf CSV column contract
        if: steps.check.outputs.should_release == 'true'
        run: python3 scripts/check_perf_csv_column_contract.py

      - name: Check display flush discipline contract
        if: steps.check.outputs.should_release == 'true'
        run: python3 scripts/check_display_flush_discipline_contract.py

      - name: Check SD lock discipline contract
        if: steps.check.outputs.should_release == 'true'
        run: python3 scripts/check_sd_lock_discipline_contract.py

      - name: Check main loop call-order contract
        if: steps.check.outputs.should_release == 'true'
        run: python3 scripts/check_main_loop_call_order_contract.py
      
      # ========== TEST (gate release on passing tests) ==========
      - name: Run unit tests
        if: steps.check.outputs.should_release == 'true'
        run: pio test -e native
      
      # ========== VERSION ==========
      - name: Get version from config.h
        if: steps.check.outputs.should_release == 'true'
        id: version
        run: |
          # Read version from config.h (source of truth)
          VERSION=$(grep '#define FIRMWARE_VERSION' include/config.h | sed 's/.*"\(.*\)".*/\1/')
          echo "Version from config.h: $VERSION"
          
          NEW_TAG="v${VERSION}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT
      
      - name: Guard against tag collision
        if: steps.check.outputs.should_release == 'true'
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "::error::Tag ${{ steps.version.outputs.tag }} already exists. Bump FIRMWARE_VERSION in config.h before merging."
            exit 1
          fi

      - name: Update other version files
        if: steps.check.outputs.should_release == 'true'
        run: |
          sed -i 's/"version": ".*"/"version": "${{ steps.version.outputs.tag }}"/' docs/install/manifest.json
          sed -i 's/^\*\*Version:\*\* .*/**Version:** ${{ steps.version.outputs.version }}/' docs/MANUAL.md
      
      # ========== BUILD ==========
      - name: Build web interface
        if: steps.check.outputs.should_release == 'true'
        run: cd interface && npm run deploy
      
      - name: Copy audio files
        if: steps.check.outputs.should_release == 'true'
        run: |
          mkdir -p data/audio
          cp tools/freq_audio/mulaw/*.mul data/audio/
          echo "Copied $(ls -1 data/audio/*.mul | wc -l) audio clips"
      
      - name: Build firmware
        if: steps.check.outputs.should_release == 'true'
        run: pio run -e waveshare-349
      
      - name: Build filesystem
        if: steps.check.outputs.should_release == 'true'
        run: pio run -e waveshare-349 -t buildfs
      
      - name: Create merged firmware
        if: steps.check.outputs.should_release == 'true'
        run: |
          mkdir -p release
          cp .pio/build/waveshare-349/bootloader.bin release/
          cp .pio/build/waveshare-349/partitions.bin release/
          cp ~/.platformio/packages/framework-arduinoespressif32/tools/partitions/boot_app0.bin release/
          cp .pio/build/waveshare-349/firmware.bin release/
          cp .pio/build/waveshare-349/littlefs.bin release/
          
          esptool.py --chip esp32s3 merge_bin \
            -o release/merged-firmware.bin \
            --flash_mode qio \
            --flash_freq 80m \
            --flash_size 16MB \
            0x0000 release/bootloader.bin \
            0x8000 release/partitions.bin \
            0xe000 release/boot_app0.bin \
            0x10000 release/firmware.bin \
            0xca0000 release/littlefs.bin
          
          # Optionally include camera databases if present
          if compgen -G "camera_data/*.bin" > /dev/null; then
            cp camera_data/*.bin release/ || true
            echo "Included $(ls camera_data/*.bin | wc -l) camera DB file(s)."
          else
            echo "No camera_data/*.bin found; skipping camera DB assets."
          fi
          
          cp docs/install/manifest.json release/
      
      # ========== TAG ==========
      - name: Create tag
        if: steps.check.outputs.should_release == 'true'
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}
      
      # ========== RELEASE ==========
      - name: Create GitHub Release
        if: steps.check.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            release/merged-firmware.bin
            release/manifest.json
            release/*.bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      # ========== DEPLOY TO FLASHER ==========
      - name: Prepare web installer files
        if: steps.check.outputs.should_release == 'true'
        run: |
          cp release/*.bin docs/install/
          cp release/manifest.json docs/install/
      
      - name: Deploy to GitHub Pages
        if: steps.check.outputs.should_release == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/install
          destination_dir: install
      
      - name: Summary
        if: steps.check.outputs.should_release == 'true'
        run: |
          echo "## 🚀 Release Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Tag created (immutable)" >> $GITHUB_STEP_SUMMARY
          echo "✅ Firmware built" >> $GITHUB_STEP_SUMMARY
          echo "✅ Camera databases packaged when present" >> $GITHUB_STEP_SUMMARY
          echo "✅ GitHub Release created" >> $GITHUB_STEP_SUMMARY
          echo "✅ Web flasher updated" >> $GITHUB_STEP_SUMMARY
