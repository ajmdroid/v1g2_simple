name: Release on Merge

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'include/**'
      - 'interface/src/**'
      - 'platformio.ini'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate_release:
    runs-on: self-hosted
    concurrency:
      group: release-validate-${{ github.ref }}
      cancel-in-progress: false
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Check if version bump commit
        id: check
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          COMMIT_MSG=$(cat << 'EOF'
          ${{ github.event.head_commit.message }}
          EOF
          )

          if [[ "$COMMIT_MSG" == "chore(release):"* ]]; then
            echo "This is a version bump commit, skipping"
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "Proceeding with release"
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        if: steps.check.outputs.should_release == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        if: steps.check.outputs.should_release == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: interface/package-lock.json

      - name: Setup Python
        if: steps.check.outputs.should_release == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.check.outputs.should_release == 'true'
        run: |
          pip install platformio esptool
          pio --version
          cd interface && npm ci

      - name: Run pre-release validation
        if: steps.check.outputs.should_release == 'true'
        run: ./scripts/ci-pre-release.sh

      - name: Verify manifest status
        if: steps.check.outputs.should_release == 'true'
        run: |
          MANIFEST=".artifacts/test_reports/pre_release/validation_manifest.json"
          if [ ! -f "$MANIFEST" ]; then
            echo "::error::Validation manifest not found"
            exit 1
          fi
          STATUS=$(python3 -c "import json; print(json.load(open('$MANIFEST'))['status'])")
          if [ "$STATUS" != "PASS" ]; then
            echo "::error::Validation manifest status is $STATUS, not PASS"
            exit 1
          fi
          echo "Manifest status: PASS"

      - name: Get version from config.h
        if: steps.check.outputs.should_release == 'true'
        id: version
        run: |
          VERSION=$(grep '#define FIRMWARE_VERSION' include/config.h | sed 's/.*"\(.*\)".*/\1/')
          echo "Version from config.h: $VERSION"
          NEW_TAG="v${VERSION}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT

      - name: Upload validation artifacts
        if: steps.check.outputs.should_release == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: release-validation-${{ github.sha }}
          path: .artifacts/test_reports/

  publish_release:
    needs: validate_release
    if: needs.validate_release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: release-publish-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: interface/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install platformio esptool
          pio --version
          cd interface && npm ci

      - name: Download validation artifacts
        uses: actions/download-artifact@v7
        with:
          name: release-validation-${{ github.sha }}
          path: .artifacts/test_reports/

      - name: Verify manifest from same run
        run: |
          MANIFEST=".artifacts/test_reports/pre_release/validation_manifest.json"
          if [ ! -f "$MANIFEST" ]; then
            echo "::error::Validation manifest artifact not found"
            exit 1
          fi
          MANIFEST_SHA=$(python3 -c "import json; print(json.load(open('$MANIFEST'))['git_sha'])")
          if [ "$MANIFEST_SHA" != "${{ github.sha }}" ]; then
            echo "::error::Manifest SHA ($MANIFEST_SHA) does not match release SHA (${{ github.sha }})"
            exit 1
          fi
          STATUS=$(python3 -c "import json; print(json.load(open('$MANIFEST'))['status'])")
          if [ "$STATUS" != "PASS" ]; then
            echo "::error::Manifest status is $STATUS"
            exit 1
          fi

      - name: Guard against tag collision
        run: |
          if git rev-parse "${{ needs.validate_release.outputs.tag }}" >/dev/null 2>&1; then
            echo "::error::Tag ${{ needs.validate_release.outputs.tag }} already exists. Bump FIRMWARE_VERSION in config.h before merging."
            exit 1
          fi

      - name: Update versioned docs
        run: |
          sed -i 's/^\*\*Version:\*\* .*/**Version:** ${{ needs.validate_release.outputs.version }}/' docs/MANUAL.md

      - name: Build web interface
        run: |
          cd interface
          npm run build
          npm run deploy

      - name: Check packaged web assets
        run: |
          python3 scripts/check_web_asset_budget.py
          python3 scripts/check_audio_asset_manifest.py

      - name: Build firmware
        run: pio run -e waveshare-349 -j 1

      - name: Build filesystem
        run: pio run -e waveshare-349 -t buildfs -j 1

      - name: Create merged firmware
        env:
          RELEASE_TAG: ${{ needs.validate_release.outputs.tag }}
        run: |
          mkdir -p release
          cp .pio/build/waveshare-349/bootloader.bin release/
          cp .pio/build/waveshare-349/partitions.bin release/
          cp ~/.platformio/packages/framework-arduinoespressif32/tools/partitions/boot_app0.bin release/
          cp .pio/build/waveshare-349/firmware.bin release/
          cp .pio/build/waveshare-349/littlefs.bin release/

          # ESP Web Tools cannot patch flash mode on the fly the way write_flash does.
          # The normal USB upload path for this board uses dio, so the merged image must
          # do the same or web-flashed devices can fail to boot and appear dead.
          esptool.py --chip esp32s3 merge_bin \
            -o release/merged-firmware.bin \
            --flash_mode dio \
            --flash_freq 80m \
            --flash_size 16MB \
            0x0000 release/bootloader.bin \
            0x8000 release/partitions.bin \
            0xe000 release/boot_app0.bin \
            0x10000 release/firmware.bin \
            0xda0000 release/littlefs.bin
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          manifest = {
              "name": "V1-Simple",
              "version": os.environ["RELEASE_TAG"],
              "home_assistant_domain": "",
              "funding_url": "",
              "new_install_prompt_erase": True,
              "new_install_improv_wait_time": 0,
              "builds": [
                  {
                      "chipFamily": "ESP32-S3",
                      "parts": [{"path": "merged-firmware.bin", "offset": 0}],
                  }
              ],
          }
          Path("release/manifest.json").write_text(json.dumps(manifest, indent=2) + "\n")
          PY

      - name: Create tag
        run: |
          git tag ${{ needs.validate_release.outputs.tag }}
          git push origin ${{ needs.validate_release.outputs.tag }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.validate_release.outputs.tag }}
          name: ${{ needs.validate_release.outputs.tag }}
          generate_release_notes: true
          files: |
            release/merged-firmware.bin
            release/manifest.json
            release/*.bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare web installer files
        run: |
          rm -rf .artifacts/web-installer
          mkdir -p .artifacts/web-installer/install
          cp web-installer/root-index.html .artifacts/web-installer/index.html
          cp web-installer/index.html .artifacts/web-installer/install/
          cp release/merged-firmware.bin .artifacts/web-installer/install/
          cp release/manifest.json .artifacts/web-installer/install/
          touch .artifacts/web-installer/.nojekyll
          echo "v1simple.com" > .artifacts/web-installer/CNAME

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./.artifacts/web-installer

      - name: Summary
        run: |
          echo "## 🚀 Release Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ needs.validate_release.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Authoritative repo gate passed" >> $GITHUB_STEP_SUMMARY
          echo "✅ Tag created (immutable)" >> $GITHUB_STEP_SUMMARY
          echo "✅ Firmware built" >> $GITHUB_STEP_SUMMARY
          echo "✅ GitHub Release created" >> $GITHUB_STEP_SUMMARY
          echo "✅ Web flasher updated" >> $GITHUB_STEP_SUMMARY
