name: Stability Trend

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 06:00 UTC
  workflow_dispatch:

jobs:
  stability-trend:
    name: Run Stability Trend Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Validate scorecard tool syntax
        run: python3 -m py_compile tools/scorecard.py

      - name: Run scorecard on base stable fixture
        id: scorecard
        continue-on-error: true
        run: |
          python3 tools/scorecard.py test/fixtures/debug_base_stable.log \
            --json > .artifacts/test_reports/stability_trend.json 2>&1 || true
          python3 tools/scorecard.py test/fixtures/debug_base_stable.log
          exit_code=$?
          echo "exit_code=$exit_code" >> $GITHUB_OUTPUT
          if [ $exit_code -eq 0 ]; then
            echo "grade=GREEN" >> $GITHUB_OUTPUT
          elif [ $exit_code -eq 1 ]; then
            echo "grade=YELLOW" >> $GITHUB_OUTPUT
          elif [ $exit_code -eq 2 ]; then
            echo "grade=RED" >> $GITHUB_OUTPUT
          else
            echo "grade=ERROR" >> $GITHUB_OUTPUT
          fi

      - name: Upload trend artifacts
        uses: actions/upload-artifact@v6
        with:
          name: stability-trend
          path: .artifacts/test_reports/stability_trend.json
          if-no-files-found: ignore

      - name: Create or update issue on regression
        if: steps.scorecard.outputs.grade == 'RED'
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Stability trend regression detected';
            const body = `The nightly stability trend analysis reported grade **${process.env.GRADE}** on commit ${context.sha}.\n\nThis is non-blocking — see the stability-trend workflow for details.`;
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'stability-trend',
            });
            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['stability-trend'],
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body,
              });
            }
        env:
          GRADE: ${{ steps.scorecard.outputs.grade }}
