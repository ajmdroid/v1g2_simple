name: Release

# Merge a PR to main → release fires automatically.
# Also available via manual "Run workflow" button.
#
# Bump FIRMWARE_VERSION in config.h on dev, push, create PR to main,
# merge (use "Create a merge commit" — NOT squash — to avoid conflicts).
#
# Steps:
#   1. Run ci-test.sh
#   2. Read version from include/config.h
#   3. Guard against tag collision
#   4. Update docs/MANUAL.md version line
#   5. Build web interface + check asset budgets
#   6. Build firmware + filesystem
#   7. Merge binaries for ESP Web Tools
#   8. Create git tag + GitHub Release with artifacts
#   9. Deploy web installer to GitHub Pages (v1simple.com)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: interface/package-lock.json

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        uses: actions/cache@v5
        with:
          path: |
            ~/.platformio/packages
            ~/.platformio/platforms
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: ${{ runner.os }}-pio-

      - name: Install toolchain
        run: |
          pip install --upgrade platformio esptool
          cd interface && npm ci

      - name: Run ci-test.sh gate
        run: ./scripts/ci-test.sh

      - name: Read version from config.h
        id: version
        run: |
          VERSION=$(grep '#define FIRMWARE_VERSION' include/config.h | sed 's/.*"\(.*\)".*/\1/')
          if [ -z "$VERSION" ]; then
            echo "::error::Could not parse FIRMWARE_VERSION from include/config.h"
            exit 1
          fi
          echo "Version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Guard against tag collision
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "::error::Tag ${{ steps.version.outputs.tag }} already exists. Bump FIRMWARE_VERSION in include/config.h before releasing."
            exit 1
          fi

      - name: Update versioned docs
        run: |
          sed -i 's/^\*\*Version:\*\* .*/**Version:** ${{ steps.version.outputs.version }}/' docs/MANUAL.md

      - name: Build web interface
        run: |
          cd interface
          npm run build
          npm run deploy

      - name: Check packaged asset budgets
        run: |
          python3 scripts/check_web_asset_budget.py
          python3 scripts/check_audio_asset_manifest.py

      - name: Build firmware
        run: pio run -e waveshare-349 -j 1

      - name: Build filesystem
        run: pio run -e waveshare-349 -t buildfs -j 1

      - name: Merge firmware for ESP Web Tools
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          mkdir -p release
          cp .pio/build/waveshare-349/bootloader.bin release/
          cp .pio/build/waveshare-349/partitions.bin release/
          cp ~/.platformio/packages/framework-arduinoespressif32/tools/partitions/boot_app0.bin release/
          cp .pio/build/waveshare-349/firmware.bin release/
          cp .pio/build/waveshare-349/littlefs.bin release/

          # ESP Web Tools cannot patch flash mode on the fly the way write_flash does.
          # The normal USB upload path uses dio, so the merged image must do the same
          # or web-flashed devices can fail to boot.
          #
          # CRITICAL: Offsets must match partitions_v1.csv exactly.
          #   app0 = 0x20000, storage = 0xDA0000
          esptool.py --chip esp32s3 merge_bin \
            -o release/merged-firmware.bin \
            --flash_mode dio \
            --flash_freq 80m \
            --flash_size 16MB \
            0x0000 release/bootloader.bin \
            0x8000 release/partitions.bin \
            0xe000 release/boot_app0.bin \
            0x20000 release/firmware.bin \
            0xda0000 release/littlefs.bin

          python3 - <<'PY'
          import json, os
          from pathlib import Path
          manifest = {
              "name": "V1-Simple",
              "version": os.environ["RELEASE_TAG"],
              "home_assistant_domain": "",
              "funding_url": "",
              "new_install_prompt_erase": True,
              "new_install_improv_wait_time": 0,
              "builds": [{
                  "chipFamily": "ESP32-S3",
                  "parts": [{"path": "merged-firmware.bin", "offset": 0}],
              }],
          }
          Path("release/manifest.json").write_text(json.dumps(manifest, indent=2) + "\n")
          PY

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            release/*.bin
            release/manifest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare web installer
        run: |
          rm -rf .artifacts/web-installer
          mkdir -p .artifacts/web-installer/install
          cp web-installer/root-index.html .artifacts/web-installer/index.html
          cp web-installer/index.html .artifacts/web-installer/install/
          cp release/merged-firmware.bin .artifacts/web-installer/install/
          cp release/manifest.json .artifacts/web-installer/install/
          touch .artifacts/web-installer/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./.artifacts/web-installer
          cname: v1simple.com

      - name: Summary
        run: |
          {
            echo "## Released ${{ steps.version.outputs.tag }}"
            echo ""
            echo "- Tag created and pushed"
            echo "- GitHub Release published with firmware + merged binary + manifest"
            echo "- Web installer deployed to v1simple.com"
          } >> $GITHUB_STEP_SUMMARY
