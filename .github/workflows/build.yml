name: CI Build Check

on:
  workflow_dispatch:
  push:
    branches:
      - dev
      - main
      - 'feature/**'
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: interface/package-lock.json

      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 📦 Cache PlatformIO
        uses: actions/cache@v5
        with:
          path: |
            ~/.platformio/packages
            ~/.platformio/platforms
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini', '.github/workflows/build.yml') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: 🔧 Install dependencies
        run: |
          pip install --upgrade platformio
          pio --version
          cd interface && npm ci

      - name: ✅ Run authoritative repo gate
        run: |
          set -o pipefail
          ./scripts/ci-test.sh 2>&1 | tee ci-test.log

      - name: 📤 Upload CI log on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: ci-test-log-${{ github.sha }}
          path: ci-test.log
          retention-days: 30

      - name: 📦 Prepare artifacts
        run: |
          mkdir -p artifacts
          cp .pio/build/waveshare-349/firmware.bin artifacts/
          cp .pio/build/waveshare-349/bootloader.bin artifacts/
          cp .pio/build/waveshare-349/partitions.bin artifacts/
          if [ -f .pio/build/waveshare-349/littlefs.bin ]; then
            cp .pio/build/waveshare-349/littlefs.bin artifacts/
          fi
          echo "Build Date: $(date)" > artifacts/BUILD_INFO.txt
          echo "Commit: ${{ github.sha }}" >> artifacts/BUILD_INFO.txt
          echo "Branch: ${{ github.ref_name }}" >> artifacts/BUILD_INFO.txt
          echo "Triggered by: ${{ github.event_name }}" >> artifacts/BUILD_INFO.txt
          ls -lhR artifacts/

      - name: 📤 Upload firmware artifacts
        uses: actions/upload-artifact@v6
        with:
          name: firmware-${{ github.sha }}
          path: artifacts/
          retention-days: 30

      - name: 📝 Create release notes
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "## 🎉 Build Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- \`firmware.bin\` - Main firmware binary" >> $GITHUB_STEP_SUMMARY
          echo "- \`bootloader.bin\` - ESP32-S3 bootloader" >> $GITHUB_STEP_SUMMARY
          echo "- \`partitions.bin\` - Partition table" >> $GITHUB_STEP_SUMMARY
          echo "- \`littlefs.bin\` - Filesystem with web interface" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🚀 Flash Instructions" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "# Download artifacts, then:" >> $GITHUB_STEP_SUMMARY
          echo "esptool.py --chip esp32s3 --port /dev/ttyUSB0 write_flash \\" >> $GITHUB_STEP_SUMMARY
          echo "  0x0000 bootloader.bin \\" >> $GITHUB_STEP_SUMMARY
          echo "  0x8000 partitions.bin \\" >> $GITHUB_STEP_SUMMARY
          echo "  0x10000 firmware.bin \\" >> $GITHUB_STEP_SUMMARY
          echo "  0xda0000 littlefs.bin" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Or use PlatformIO:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "pio run -j 1 -t upload" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
