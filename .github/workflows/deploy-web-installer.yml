name: Deploy Web Installer

on:
  push:
    branches:
      - main
    paths:
      - 'web-installer/**'
      - '.github/workflows/deploy-web-installer.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-web-installer-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare web installer files
        run: |
          rm -rf .artifacts/web-installer
          mkdir -p .artifacts/web-installer/install
          cp web-installer/root-index.html .artifacts/web-installer/index.html
          cp web-installer/index.html .artifacts/web-installer/install/
          touch .artifacts/web-installer/.nojekyll
          echo "v1simple.com" > .artifacts/web-installer/CNAME

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./.artifacts/web-installer
          keep_files: true

      - name: Summary
        run: |
          echo "## Installer Deploy Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Updated the installer HTML entrypoints without creating a new firmware release." >> $GITHUB_STEP_SUMMARY