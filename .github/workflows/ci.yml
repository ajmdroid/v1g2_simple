name: CI

# Dev pipeline: test every push, then auto-bump version and open a
# release PR to main.  The only manual step is merging the PR.
#
# Push to dev  → test → bump patch version → create/update PR
# PR to main   → test only (branch protection status check)
# workflow_dispatch → same as push to dev
#
# Version bump commits pushed by this workflow use GITHUB_TOKEN,
# which does NOT trigger new workflow runs — no infinite loop.

on:
  push:
    branches: [dev]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ci-test.sh
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: interface/package-lock.json

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        uses: actions/cache@v5
        with:
          path: |
            ~/.platformio/packages
            ~/.platformio/platforms
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: ${{ runner.os }}-pio-

      - name: Install toolchain
        run: |
          pip install --upgrade platformio
          cd interface && npm ci

      - name: Run ci-test.sh
        run: |
          set -o pipefail
          ./scripts/ci-test.sh 2>&1 | tee ci-test.log

      - name: Upload log on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: ci-test-log-${{ github.sha }}
          path: ci-test.log
          retention-days: 14

  release-pr:
    name: Version bump + PR
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.ref == 'refs/heads/dev'

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Bump version if needed
        id: bump
        run: |
          VERSION=$(grep '#define FIRMWARE_VERSION' include/config.h | sed 's/.*"\(.*\)".*/\1/')
          echo "Current version: $VERSION"

          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            # Tag exists for this version — bump patch
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
            PATCH=$((PATCH + 1))
            NEW_VERSION="$MAJOR.$MINOR.$PATCH"
            sed -i "s/#define FIRMWARE_VERSION \"$VERSION\"/#define FIRMWARE_VERSION \"$NEW_VERSION\"/" include/config.h
            echo "Bumped $VERSION → $NEW_VERSION"
            echo "bumped=true" >> $GITHUB_OUTPUT
          else
            # Version already ahead of latest tag (manual bump or prior auto-bump)
            NEW_VERSION="$VERSION"
            echo "Version $VERSION has no tag yet, no bump needed"
            echo "bumped=false" >> $GITHUB_OUTPUT
          fi

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit version bump
        if: steps.bump.outputs.bumped == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add include/config.h
          git commit -m "chore(release): bump to ${{ steps.bump.outputs.version }}"
          git push

      - name: Create or update PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.bump.outputs.tag }}"
          TITLE="release: $TAG"
          BODY="Automated release PR for $TAG.

          Merge to build firmware, create GitHub Release, and deploy web installer."

          EXISTING_PR=$(gh pr list --head dev --base main --json number --jq '.[0].number')

          if [ -n "$EXISTING_PR" ]; then
            gh pr edit "$EXISTING_PR" --title "$TITLE" --body "$BODY"
            echo "Updated PR #$EXISTING_PR → $TITLE"
          else
            gh pr create --base main --head dev --title "$TITLE" --body "$BODY"
            echo "Created PR: $TITLE"
          fi
