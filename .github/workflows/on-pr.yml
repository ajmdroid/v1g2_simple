name: PR Gate

# The single authoritative CI gate for this repo.
#
# Runs ./scripts/ci-test.sh — the maintainer-owned suite that includes
# semantic guards, 1K+ unit tests, mutation tests (critical tier), perf
# gates, frontend tests, and firmware build. If this passes, the commit
# is shippable.
#
# Design goals:
#   - ONE workflow to rule them all for code validation
#   - Fast: ~12 min on a cache hit
#   - Required check on main (configure in Settings → Branches)
#   - No artifact bloat, no release notes, no extra jobs
#
# If this file grows past ~30 lines, something is wrong.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]      # catch direct pushes to main (shouldn't happen with branch protection, but fail closed)
  workflow_dispatch:      # manual re-run without re-pushing

concurrency:
  group: pr-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ci-test.sh
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: interface/package-lock.json

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        uses: actions/cache@v5
        with:
          path: |
            ~/.platformio/packages
            ~/.platformio/platforms
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: ${{ runner.os }}-pio-

      - name: Install toolchain
        run: |
          pip install --upgrade platformio
          cd interface && npm ci

      - name: Run authoritative repo gate
        run: |
          set -o pipefail
          ./scripts/ci-test.sh 2>&1 | tee ci-test.log

      - name: Upload log on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: ci-test-log-${{ github.sha }}
          path: ci-test.log
          retention-days: 14
