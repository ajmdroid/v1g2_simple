services:
  postgis:
    image: postgis/postgis:16-3.4
    container_name: v1simple_osm_postgis
    environment:
      POSTGRES_DB: osm
      POSTGRES_USER: osm
      POSTGRES_PASSWORD: osm
    ports:
      - "5432:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./data:/data
    shm_size: 1g
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U osm -d osm"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgis_data:
